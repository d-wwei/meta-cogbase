registry_version: 1
name: official
description: "Official cognitive bases — meta-cognitive instruction sets for AI agents"

bases:
  # === Tier 5: Core Reasoning Paradigms ===

  - name: first-principles
    display_name: "第一性原理 First Principles"
    description: "审计假设，分解到可验证基础，无约束重建"
    tier: 5
    tags: [core, reasoning, decomposition]
    repo: "https://github.com/d-wwei/first-principles.git"
    schema_version: 1

  - name: dialectical-thinking
    display_name: "矛盾论 Dialectical Thinking"
    description: "以矛盾论为核心的辩证思维，识别主要矛盾，综合超越对立"
    tier: 5
    tags: [core, reasoning, contradiction]
    repo: "https://github.com/d-wwei/dialectical-thinking.git"
    schema_version: 1

  - name: results-driven
    display_name: "以终为始 Results-Driven"
    description: "结果导向——以成果为标准，以证据为支撑，拒绝半成品"
    tier: 5
    tags: [core, verification, completion]
    repo: "https://github.com/d-wwei/what-is-good-job.git"
    schema_version: 1

  - name: systems-thinking
    display_name: "系统性思考 Systems Thinking"
    description: "看到反馈循环、涌现、杠杆点的系统性视野"
    tier: 5
    tags: [core, reasoning, feedback-loops]
    repo: "https://github.com/d-wwei/systems-thinking.git"
    schema_version: 1

